name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f requirements_local.txt ]; then pip install -r requirements_local.txt; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check .
    - name: Python Smoke Test (Initial Eval only, no LLM)
      run: |
        # Just check if the help and initial imports work
        python generate_loop_local.py --help
        # Run a tiny evaluation without LLM calls if possible, 
        # but for now we'll just check if it can start.
        python -m domains.harness --help

  rust-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Rust Format
      run: cargo fmt --all -- --check
      working-directory: ./rust
    - name: Rust Clippy
      run: cargo clippy -- -D warnings
      working-directory: ./rust
    - name: Rust Build
      run: cargo build --verbose
      working-directory: ./rust
